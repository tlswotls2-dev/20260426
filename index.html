<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한울초등학교 급식 정보</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🍱 한울초 급식실</h1>
            <div class="school-info">경기도 화성시 한울초등학교</div>
        </header>

        <section class="date-selector">
            <input type="date" id="meal-date">
            <div class="action-buttons">
                <button id="refresh-btn">급식 불러오기</button>
                <button class="secondary" id="open-settings">알러지 설정</button>
            </div>
        </section>

        <main class="meal-content" id="meal-container">
            <div class="empty-msg">날짜를 선택하고 급식을 불러오세요.</div>
        </main>

        <footer>
            <p>© 2026 Hanul Elementary School Meal Info</p>
            <p>데이터 제공: 나이스 교육정보 개방 포털</p>
        </footer>
    </div>

    <!-- Allergy Settings Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🚫 알러지 설정</h2>
                <span class="modal-close" id="close-modal">&times;</span>
            </div>
            <p style="font-size: 0.85rem; color: #6b7280; margin-bottom: 1rem;">
                해당하는 성분을 선택하면 식단에서 빨간색으로 표시됩니다.
            </p>
            <div class="allergy-grid" id="allergy-grid">
                <!-- Will be populated by JS -->
            </div>
            <button id="save-settings" style="width: 100%; margin-top: 1.5rem;">저장하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
